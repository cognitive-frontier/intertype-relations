<script type="text/babel">

  accent1: "#06b6d4", accent2: "#8b5cf6", accent3: "#10b981", accent4: "#f59e0b",

  asymmetric: "#f59e0b",   // amber , compositional / asymmetric

// Relation card: used across all category sections

    <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 4 }}>

        ))}
      </div>
    )}
  </div>
);

// Donut chart for Bukalov marriage statistics
const DonutChart = ({ data, size = 380 }) => {
  const cx = size / 2, cy = size / 2, r = size * 0.40, inner = size * 0.24;
  let cumulative = 0;
  const total = data.reduce((s, d) => s + d.value, 0);
  const segments = data.map((d) => {
    const startAngle = (cumulative / total) * Math.PI * 2 - Math.PI / 2;
    cumulative += d.value;
    const endAngle = (cumulative / total) * Math.PI * 2 - Math.PI / 2;
    const largeArc = endAngle - startAngle > Math.PI ? 1 : 0;
    const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    const x3 = cx + inner * Math.cos(endAngle), y3 = cy + inner * Math.sin(endAngle);
    const x4 = cx + inner * Math.cos(startAngle), y4 = cy + inner * Math.sin(startAngle);
    const path = `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} L ${x3} ${y3} A ${inner} ${inner} 0 ${largeArc} 0 ${x4} ${y4} Z`;
    const midAngle = (startAngle + endAngle) / 2;
    const labelR = (r + inner) / 2;
    return { path, color: d.color, label: d.label, value: d.value, lx: cx + labelR * Math.cos(midAngle), ly: cy + labelR * Math.sin(midAngle) };
  });
  return (
    <div style={{ display: "flex", gap: 32, alignItems: "center", flexWrap: "wrap", justifyContent: "center" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {segments.map((s, i) => (
          <g key={i}>
            <path d={s.path} fill={s.color} stroke={C.bg} strokeWidth="2" opacity="0.88" />
            {s.value >= 8 && (
              <text x={s.lx} y={s.ly} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize="18" fontWeight="800" fontFamily="'JetBrains Mono', monospace">{s.value}%</text>
            )}
            {s.value < 8 && s.value >= 5 && (
              <text x={s.lx} y={s.ly} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize="14" fontWeight="700" fontFamily="'JetBrains Mono', monospace">{s.value}%</text>
            )}
          </g>
        ))}
        <text x={cx} y={cy - 10} textAnchor="middle" fill={C.textMuted} fontSize="11" fontFamily="'JetBrains Mono', monospace" letterSpacing="2">BUKALOV</text>
        <text x={cx} y={cy + 10} textAnchor="middle" fill={C.text} fontSize="14" fontWeight="700" fontFamily="'JetBrains Mono', monospace">MARRIAGES</text>
      </svg>
      <div style={{ display: "flex", flexDirection: "column", gap: 12, minWidth: 240 }}>
        {data.map((d, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 16, height: 16, borderRadius: 4, background: d.color }} />
            <div style={{ flex: 1, fontSize: 14, color: C.text, fontWeight: 500 }}>{d.label}</div>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 15, fontWeight: 700, color: d.color }}>{d.value}%</span>
          </div>
        ))}
      </div>
    </div>
  );
};

// Stacked bar showing breakdown within the "Inside Quadra" segment
const StackedBar = ({ data, title }) => {
  const total = data.reduce((s, d) => s + d.value, 0);
  return (
    <div style={{ marginTop: 8 }}>
      {title && <div style={{ fontSize: 11, color: C.textDim, marginBottom: 10, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, textTransform: "uppercase" }}>{title}</div>}
      <div style={{ display: "flex", height: 44, borderRadius: 8, overflow: "hidden", border: `1px solid ${C.border}` }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex: d.value, background: `linear-gradient(180deg, ${d.color}, ${d.color}bb)`, display: "flex", alignItems: "center", justifyContent: "center", position: "relative", borderRight: i < data.length - 1 ? `1px solid ${C.bg}` : "none" }}>
            <div style={{ color: "#fff", fontSize: 12, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" }}>{d.value}%</div>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", marginTop: 10, gap: 14, flexWrap: "wrap" }}>
        {data.map((d, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 10, height: 10, borderRadius: 2, background: d.color }} />
            <span style={{ fontSize: 11, color: C.textMuted, fontWeight: 500 }}>{d.label}</span>

// ═══════════════════ SOCIOGRAM ═══════════════════
function SociogramView() {
  const [selType, setSelType] = React.useState(null);
  const [hovEdge, setHovEdge] = React.useState(null);
  const [ringMode, setRingMode] = React.useState(null); // null | 'benefit' | 'supervision'
  const [filters, setFilters] = React.useState({ core: true, reinin: true, tencer: true, rings: true });
  const [tooltip, setTooltip] = React.useState(null);
  const [selRing, setSelRing] = React.useState(null); // which specific ring index (0-3) is highlighted

  const W = 700, H = 700, CX = 350, CY = 350, R = 265, NR = 21;

  const TYPES_ORDER = ["ILE","SEI","ESE","LII","EIE","LSI","SLE","IEI","SEE","ILI","LIE","ESI","LSE","EII","IEE","SLI"];

  const QUADRA_INFO = [
    { name:"Alpha", types:["ILE","SEI","ESE","LII"], color:"#3b82f6", start:0, end:3 },
    { name:"Beta",  types:["EIE","LSI","SLE","IEI"], color:"#a78bfa", start:4, end:7 },
    { name:"Gamma", types:["SEE","ILI","LIE","ESI"], color:"#ef4444", start:8, end:11 },
    { name:"Delta", types:["LSE","EII","IEE","SLI"], color:"#22c55e", start:12, end:15 },
  ];

  const RMETA = {
    Du:{ cat:'core',   color:'#10b981', name:'Dual',           sym:true  },
    Su:{ cat:'core',   color:'#ef4444', name:'Super-Ego',      sym:true  },
    Ex:{ cat:'core',   color:'#8b5cf6', name:'Extinguishment', sym:true  },
    Mr:{ cat:'reinin', color:'#06b6d4', name:'Mirror',         sym:true  },
    Co:{ cat:'reinin', color:'#dc2626', name:'Conflict',       sym:true  },
    Ac:{ cat:'reinin', color:'#14b8a6', name:'Activity',       sym:true  },
    Qd:{ cat:'reinin', color:'#3b82f6', name:'Quasi-Identity', sym:true  },
    Ki:{ cat:'tencer', color:'#0ea5e9', name:'Kindred',        sym:true  },
    Bu:{ cat:'tencer', color:'#22c55e', name:'Business',       sym:true  },
    Sd:{ cat:'tencer', color:'#eab308', name:'Semi-Dual',      sym:true  },
    Mg:{ cat:'tencer', color:'#f97316', name:'Mirage',         sym:true  },
    Bn:{ cat:'rings',  color:'#f59e0b', name:'Benefactor →', sym:false },
    Sv:{ cat:'rings',  color:'#d97706', name:'Supervisor →', sym:false },
  };

  const RD = {
    ILE:{Du:"SEI",Ac:"ESE",Mr:"LII",Ki:"IEE",Mg:"IEI",Bu:"SLE",Sd:"SLI",Qd:"LIE",Ex:"ILI",Su:"SEE",Co:"ESI",Bn:"EIE",Sv:"LSI"},
    SEI:{Du:"ILE",Ac:"LII",Mr:"ESE",Ki:"SLI",Mg:"SLE",Bu:"IEI",Sd:"IEE",Qd:"ESI",Ex:"SEE",Su:"ILI",Co:"LIE",Bn:"LSI",Sv:"EIE"},
    LII:{Du:"ESE",Ac:"SEI",Mr:"ILE",Ki:"LSI",Mg:"LSE",Bu:"EII",Sd:"EIE",Qd:"ILI",Ex:"LIE",Su:"ESI",Co:"SEE",Bn:"SLI",Sv:"IEE"},
    ESE:{Du:"LII",Ac:"ILE",Mr:"SEI",Ki:"EIE",Mg:"EII",Bu:"LSE",Sd:"LSI",Qd:"SEE",Ex:"ESI",Su:"LIE",Co:"ILI",Bn:"IEE",Sv:"SLI"},
    EIE:{Du:"LSI",Ac:"SLE",Mr:"IEI",Ki:"ESE",Mg:"ESI",Bu:"LIE",Sd:"LII",Qd:"IEE",Ex:"EII",Su:"LSE",Co:"SLI",Bn:"SEE",Sv:"ILI"},
    LSI:{Du:"EIE",Ac:"IEI",Mr:"SLE",Ki:"LII",Mg:"LIE",Bu:"ESI",Sd:"ESE",Qd:"SLI",Ex:"LSE",Su:"EII",Co:"IEE",Bn:"ILI",Sv:"SEE"},
    SLE:{Du:"IEI",Ac:"EIE",Mr:"LSI",Ki:"SEE",Mg:"SEI",Bu:"ILE",Sd:"ILI",Qd:"LSE",Ex:"SLI",Su:"IEE",Co:"EII",Bn:"ESE",Sv:"LII"},
    IEI:{Du:"SLE",Ac:"LSI",Mr:"EIE",Ki:"ILI",Mg:"ILE",Bu:"SEI",Sd:"SEE",Qd:"EII",Ex:"IEE",Su:"SLI",Co:"LSE",Bn:"LII",Sv:"ESE"},
    SEE:{Du:"ILI",Ac:"LIE",Mr:"ESI",Ki:"SLE",Mg:"SLI",Bu:"IEE",Sd:"IEI",Qd:"ESE",Ex:"SEI",Su:"ILE",Co:"LII",Bn:"LSE",Sv:"EII"},
    ILI:{Du:"SEE",Ac:"ESI",Mr:"LIE",Ki:"IEI",Mg:"IEE",Bu:"SLI",Sd:"SLE",Qd:"LII",Ex:"ILE",Su:"SEI",Co:"ESE",Bn:"EII",Sv:"LSE"},
    LIE:{Du:"ESI",Ac:"SEE",Mr:"ILI",Ki:"LSE",Mg:"LSI",Bu:"EIE",Sd:"EII",Qd:"ILE",Ex:"LII",Su:"ESE",Co:"SEI",Bn:"SLE",Sv:"IEI"},
    ESI:{Du:"LIE",Ac:"ILI",Mr:"SEE",Ki:"EII",Mg:"EIE",Bu:"LSI",Sd:"LSE",Qd:"SEI",Ex:"ESE",Su:"LII",Co:"ILE",Bn:"IEI",Sv:"SLE"},
    LSE:{Du:"EII",Ac:"IEE",Mr:"SLI",Ki:"LIE",Mg:"LII",Bu:"ESE",Sd:"ESI",Qd:"SLE",Ex:"LSI",Su:"EIE",Co:"IEI",Bn:"ILE",Sv:"SEI"},
    EII:{Du:"LSE",Ac:"SLI",Mr:"IEE",Ki:"ESI",Mg:"ESE",Bu:"LII",Sd:"LIE",Qd:"IEI",Ex:"EIE",Su:"LSI",Co:"SLE",Bn:"SEI",Sv:"ILE"},
    IEE:{Du:"SLI",Ac:"LSE",Mr:"EII",Ki:"ILE",Mg:"ILI",Bu:"SEE",Sd:"SEI",Qd:"EIE",Ex:"IEI",Su:"SLE",Co:"LSI",Bn:"LIE",Sv:"ESI"},
    SLI:{Du:"IEE",Ac:"EII",Mr:"LSE",Ki:"SEI",Mg:"SEE",Bu:"ILI",Sd:"ILE",Qd:"LSI",Ex:"SLE",Su:"IEI",Co:"EIE",Bn:"ESI",Sv:"LIE"},
  };

  const BENEFIT_RINGS = [
    ["ILE","EIE","SEE","LSE"],
    ["SEI","LSI","ILI","EII"],
    ["ESE","IEE","LIE","SLE"],
    ["LII","SLI","ESI","IEI"],
  ];
  const SUPERV_RINGS = [
    ["ILE","LSI","SEE","EII"],
    ["SEI","EIE","ILI","LSE"],
    ["ESE","SLI","LIE","IEI"],
    ["LII","IEE","ESI","SLE"],
  ];

  // Node positions on circle
  const npos = {};
  TYPES_ORDER.forEach((t, i) => {
    const a = (i / 16) * Math.PI * 2 - Math.PI / 2;
    npos[t] = { x: CX + R * Math.cos(a), y: CY + R * Math.sin(a) };
  });

  // Edge endpoint helpers: offset to node circumference
  const eS = (t) => {
    const p = npos[t], dx = CX - p.x, dy = CY - p.y, d = Math.sqrt(dx*dx+dy*dy);
    return { x: p.x + dx*(NR+2)/d, y: p.y + dy*(NR+2)/d };
  };
  const eE = (t) => {
    const p = npos[t], dx = CX - p.x, dy = CY - p.y, d = Math.sqrt(dx*dx+dy*dy);
    return { x: p.x + dx*(NR+8)/d, y: p.y + dy*(NR+8)/d };
  };
  const symPath = (a, b) => { const s=eS(a),e=eS(b); return `M ${s.x.toFixed(1)} ${s.y.toFixed(1)} Q ${CX} ${CY} ${e.x.toFixed(1)} ${e.y.toFixed(1)}`; };
  const dirPath = (a, b) => { const s=eS(a),e=eE(b); return `M ${s.x.toFixed(1)} ${s.y.toFixed(1)} Q ${CX} ${CY} ${e.x.toFixed(1)} ${e.y.toFixed(1)}`; };

  const idxOf = (t) => TYPES_ORDER.indexOf(t);

  // Build edge list, deduplicating symmetric pairs
  const edges = React.useMemo(() => {
    const list = [];
    const seen = new Set();
    TYPES_ORDER.forEach(src => {
      Object.entries(RD[src]).forEach(([code, tgt]) => {
        const meta = RMETA[code];
        if (!meta) return;
        if (meta.sym) {
          const key = [idxOf(src), idxOf(tgt)].sort((a,b)=>a-b).join('-');
          if (seen.has(key)) return;
          seen.add(key);
          list.push({ src, tgt, code, meta, path: symPath(src, tgt), key: `${src}-${code}-${tgt}` });
        } else {
          list.push({ src, tgt, code, meta, path: dirPath(src, tgt), key: `${src}-${code}-${tgt}` });
        }
      });
    });
    return list;
  }, []);

  // Build ring edge sets
  const ringEdgeSet = React.useMemo(() => {
    const sets = { benefit: new Set(), supervision: new Set() };
    BENEFIT_RINGS.forEach(ring => ring.forEach((t,i) => sets.benefit.add(`${t}-${ring[(i+1)%4]}`)));
    SUPERV_RINGS.forEach(ring => ring.forEach((t,i) => sets.supervision.add(`${t}-${ring[(i+1)%4]}`)));
    return sets;
  }, []);

  // Per-ring sets for individual ring selection
  const ringBySets = React.useMemo(() => {
    return {
      benefit: BENEFIT_RINGS.map(ring => {
        const s = new Set();
        ring.forEach((t,i) => s.add(`${t}-${ring[(i+1)%4]}`));
        return s;
      }),
      supervision: SUPERV_RINGS.map(ring => {
        const s = new Set();
        ring.forEach((t,i) => s.add(`${t}-${ring[(i+1)%4]}`));
        return s;
      }),
    };
  }, []);

  const activeRingSet = ringMode ? (selRing !== null ? ringBySets[ringMode][selRing] : ringEdgeSet[ringMode]) : null;

  // Filter visible edges
  const visibleEdges = edges.filter(e => {
    if (!filters[e.meta.cat]) return false;
    if (selType) return e.src === selType || e.tgt === selType;
    if (ringMode) return activeRingSet && activeRingSet.has(`${e.src}-${e.tgt}`);
    return true;
  });

  // Quadra sector arc paths
  const sectorPath = (startIdx, endIdx) => {
    const Ri = R - 36, Ro = R + 36;
    const a0 = (startIdx / 16) * Math.PI * 2 - Math.PI / 2;
    const a1 = (endIdx   / 16) * Math.PI * 2 - Math.PI / 2;
    const ix0=CX+Ri*Math.cos(a0), iy0=CY+Ri*Math.sin(a0);
    const ox0=CX+Ro*Math.cos(a0), oy0=CY+Ro*Math.sin(a0);
    const ix1=CX+Ri*Math.cos(a1), iy1=CY+Ri*Math.sin(a1);
    const ox1=CX+Ro*Math.cos(a1), oy1=CY+Ro*Math.sin(a1);
    const laf = (a1 - a0) > Math.PI ? 1 : 0;
    return `M ${ox0.toFixed(1)} ${oy0.toFixed(1)} A ${Ro} ${Ro} 0 ${laf} 1 ${ox1.toFixed(1)} ${oy1.toFixed(1)} L ${ix1.toFixed(1)} ${iy1.toFixed(1)} A ${Ri} ${Ri} 0 ${laf} 0 ${ix0.toFixed(1)} ${iy0.toFixed(1)} Z`;
  };

  const toggleFilter = (cat) => setFilters(f => ({ ...f, [cat]: !f[cat] }));
  const toggleRing = (mode) => {
    if (ringMode === mode) { setRingMode(null); setSelRing(null); }
    else { setRingMode(mode); setSelType(null); setSelRing(null); }
  };

  const CAT_COLORS = { core:'#10b981', reinin:'#06b6d4', tencer:'#a78bfa', rings:'#f59e0b' };

  const RING_COLORS = ['#f59e0b','#0ea5e9','#10b981','#ec4899'];

  return (

      {/* ── Controls ── */}
      <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'center', marginBottom:16, padding:'14px 18px', background:C.card, border:`1px solid ${C.border}`, borderRadius:12 }}>
        <span style={{ fontSize:10, color:C.textDim, fontFamily:"'JetBrains Mono',monospace", letterSpacing:1, textTransform:'uppercase', marginRight:4 }}>Show</span>
        {Object.keys(CAT_LABELS).map(cat => (
          <button key={cat} className="sgram-btn" onClick={() => toggleFilter(cat)} style={{ color: filters[cat] ? CAT_COLORS[cat] : C.textDim, borderColor: filters[cat] ? `${CAT_COLORS[cat]}60` : 'rgba(255,255,255,0.1)', background: filters[cat] ? `${CAT_COLORS[cat]}10` : 'transparent' }}>
            {CAT_LABELS[cat]}
          </button>
        ))}
        <div style={{ width:1, height:22, background:C.border, margin:'0 4px' }} />
        <span style={{ fontSize:10, color:C.textDim, fontFamily:"'JetBrains Mono',monospace", letterSpacing:1, textTransform:'uppercase', marginRight:4 }}>Rings</span>
        {['benefit','supervision'].map(mode => (
          <button key={mode} className="sgram-btn" onClick={() => toggleRing(mode)} style={{ color: ringMode===mode ? '#f59e0b' : C.textMuted, borderColor: ringMode===mode ? '#f59e0b60' : 'rgba(255,255,255,0.1)', background: ringMode===mode ? '#f59e0b10' : 'transparent', textTransform:'capitalize' }}>
            {mode}
          </button>
        ))}
        {selType && (
          <button className="sgram-btn" onClick={() => setSelType(null)} style={{ color:'#ec4899', borderColor:'#ec489960', marginLeft:'auto' }}>
            ✕ {selType}
          </button>
        )}
      </div>

      {/* ── Ring sub-selector ── */}
      {ringMode && (
        <div style={{ display:'flex', gap:8, marginBottom:12, padding:'10px 14px', background:`${C.card}aa`, border:`1px solid ${C.border}`, borderRadius:10 }}>
          <span style={{ fontSize:10, color:C.textDim, fontFamily:"'JetBrains Mono',monospace", letterSpacing:1, textTransform:'uppercase', alignSelf:'center', marginRight:4 }}>Ring</span>
          {(ringMode==='benefit' ? BENEFIT_RINGS : SUPERV_RINGS).map((ring, ri) => (
            <button key={ri} className="sgram-btn" onClick={() => setSelRing(selRing===ri ? null : ri)} style={{ color: selRing===ri ? RING_COLORS[ri] : C.textMuted, borderColor: selRing===ri ? `${RING_COLORS[ri]}70` : 'rgba(255,255,255,0.1)', background: selRing===ri ? `${RING_COLORS[ri]}12` : 'transparent', fontFamily:"'JetBrains Mono',monospace", fontSize:11 }}>
              {ring.join(' → ')}
            </button>
          ))}
        </div>
      )}

      {/* ── SVG Sociogram ── */}
      <div style={{ position:'relative' }}>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ maxWidth:W, display:'block', margin:'0 auto', background:C.card, borderRadius:14, border:`1px solid ${C.border}` }}>
          <defs>
            <marker id="arr-Bn" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
              <polygon points="0,0 7,3.5 0,7" fill="#f59e0b" opacity="0.95"/>
            </marker>
            <marker id="arr-Sv" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
              <polygon points="0,0 7,3.5 0,7" fill="#d97706" opacity="0.95"/>
            </marker>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          {/* Quadra sector bands */}
          {QUADRA_INFO.map(q => (
            <path key={q.name} d={sectorPath(q.start - 0.5, q.end + 0.5)} fill={q.color} opacity="0.065" />
          ))}

          {/* Sector border rings and dividers */}
          {(() => {
            const Ri = R - 36, Ro = R + 36;
            const silver = "rgba(180,182,196,0.38)";
            // Seam angles: mid-gap between quadras at indices -0.5, 3.5, 7.5, 11.5
            const seamIdxs = [-0.5, 3.5, 7.5, 11.5];
            // Mid-quadra (dual-pair divider) angles at indices 1.5, 5.5, 9.5, 13.5
            const midIdxs  = [1.5, 5.5, 9.5, 13.5];
            const ang = i => (i / 16) * Math.PI * 2 - Math.PI / 2;
            return (
              <g>
                {/* Outer bounding circle */}
                <circle cx={CX} cy={CY} r={Ro} fill="none" stroke={silver} strokeWidth="1.2"/>
                {/* Inner bounding circle */}
                <circle cx={CX} cy={CY} r={Ri} fill="none" stroke={silver} strokeWidth="1.2"/>
                {/* Solid seam lines between quadras */}
                {seamIdxs.map((idx, i) => {
                  const a = ang(idx);
                  return <line key={i} x1={CX+Ri*Math.cos(a)} y1={CY+Ri*Math.sin(a)} x2={CX+Ro*Math.cos(a)} y2={CY+Ro*Math.sin(a)} stroke={silver} strokeWidth="1.2"/>;
                })}
                {/* Dashed dual-pair dividers (within each quadra) */}
                {midIdxs.map((idx, i) => {
                  const a = ang(idx);
                  return <line key={i} x1={CX+Ri*Math.cos(a)} y1={CY+Ri*Math.sin(a)} x2={CX+Ro*Math.cos(a)} y2={CY+Ro*Math.sin(a)} stroke="rgba(80,82,100,0.7)" strokeWidth="0.8" strokeDasharray="3 3"/>;
                })}
              </g>
            );
          })()}

          {/* Quadra name labels */}
          {QUADRA_INFO.map(q => {
            const midA = ((q.start + q.end + 1) / 2 / 16) * Math.PI * 2 - Math.PI / 2;
            const lr = R + 74;
            return (
              <text key={q.name} x={CX + lr*Math.cos(midA)} y={CY + lr*Math.sin(midA)} textAnchor="middle" dominantBaseline="middle" fill={q.color} fontSize="12" fontFamily="'JetBrains Mono',monospace" letterSpacing="1.5" opacity="0.75" fontWeight="600">{q.name.toUpperCase()}</text>
            );
          })}

          {/* Corner hint: top-left, clear of all edges */}
          {!selType && !ringMode && (
            <g opacity="0.5">
              <rect x="12" y="12" width="130" height="22" rx="6" fill={C.bg} stroke={C.border}/>
              <text x="22" y="23.5" dominantBaseline="middle" fill={C.textDim} fontFamily="'JetBrains Mono',monospace">
                <tspan fontSize="10">{"↑ click any type "}</tspan><tspan fontSize="13" dy="0.5">↘</tspan>
              </text>
            </g>
          )}
          {selType && (
            <g>
              <text x={CX} y={CY-10} textAnchor="middle" dominantBaseline="middle" fill={QUADRA_INFO.find(q=>q.types.includes(selType))?.color || C.text} fontSize="20" fontWeight="800" fontFamily="'JetBrains Mono',monospace">{selType}</text>
              <text x={CX} y={CY+14} textAnchor="middle" dominantBaseline="middle" fill={C.textDim} fontSize="9" fontFamily="'JetBrains Mono',monospace" letterSpacing="1">RELATIONS</text>
            </g>
          )}

          {/* Edges: render dimmed first, then highlighted on top */}
          {visibleEdges.map(e => {
            const isRing = activeRingSet && activeRingSet.has(`${e.src}-${e.tgt}`);
            const isHov = hovEdge === e.key;
            const focused = selType ? (e.src===selType||e.tgt===selType) : (ringMode ? isRing : true);
            const op = focused ? (isHov ? 1 : 0.75) : 0.08;
            const sw = isHov ? 2.8 : (focused ? 1.8 : 1);
            const useDash = !e.meta.sym && ringMode && isRing;
            return (
              <path
                key={e.key}
                d={e.path}
                fill="none"
                stroke={e.meta.color}
                strokeWidth={sw}
                opacity={op}
                strokeDasharray={useDash ? "8 4" : undefined}
                strokeDashoffset={useDash ? "0" : undefined}
                className={useDash ? "ring-edge" : undefined}
                markerEnd={!e.meta.sym ? `url(#arr-${e.code})` : undefined}
                filter={isHov ? "url(#glow)" : undefined}
                onMouseEnter={ev => { setHovEdge(e.key); setTooltip({ x:ev.clientX, y:ev.clientY, src:e.src, tgt:e.tgt, name:e.meta.name, color:e.meta.color, sym:e.meta.sym }); }}
                onMouseLeave={() => { setHovEdge(null); setTooltip(null); }}
                style={{ cursor:'pointer' }}
              />
            );
          })}

          {/* Nodes */}
          {TYPES_ORDER.map(t => {
            const p = npos[t];
            const q = QUADRA_INFO.find(q => q.types.includes(t));
            const isSel = selType === t;
            const isConn = selType && selType !== t && Object.values(RD[selType]).includes(t);
            const inRing = ringMode && activeRingSet && [...activeRingSet].some(k => k.startsWith(t+'-')||k.endsWith('-'+t));
            const dimmed = (selType && !isSel && !isConn) || (ringMode && !selType && !inRing);
            return (
              <g key={t} onClick={() => { setSelType(selType===t ? null : t); if(ringMode) setRingMode(null); }} style={{ cursor:'pointer' }}>
                <circle cx={p.x} cy={p.y} r={NR+7} fill="transparent"/>
                <circle cx={p.x} cy={p.y} r={NR} fill={isSel ? `${q.color}22` : C.bg} stroke={isSel ? q.color : `${q.color}70`} strokeWidth={isSel ? 2.5 : 1.5} opacity={dimmed ? 0.25 : 1} filter={isSel ? "url(#glow)" : undefined}/>
                <text x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fill={isSel ? q.color : (dimmed ? C.textDim : C.text)} fontSize="10" fontWeight={isSel ? "800" : "600"} fontFamily="'JetBrains Mono',monospace" opacity={dimmed ? 0.3 : 1}>{t}</text>
              </g>
            );
          })}
        </svg>

        {/* Floating tooltip */}
        {tooltip && (
          <div style={{ position:'fixed', left:tooltip.x+14, top:tooltip.y-10, pointerEvents:'none', zIndex:9999, background:C.card, border:`1px solid ${tooltip.color}50`, borderRadius:8, padding:'8px 12px', fontSize:12, color:C.text, whiteSpace:'nowrap', boxShadow:'0 4px 20px rgba(0,0,0,0.5)' }}>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", color:tooltip.color, fontWeight:700 }}>{tooltip.name}</span>
            <span style={{ color:C.textDim, margin:'0 6px' }}>{tooltip.sym ? '⟷' : '→'}</span>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", color:C.textMuted }}>{tooltip.src} {tooltip.sym ? '↔' : '→'} {tooltip.tgt}</span>
          </div>
        )}
      </div>

      {/* ── Legend ── */}
      {(() => {
        const groups = [
          { header:"Reinin or Minaiev", sub:"Either space",      codes:["Du","Su","Ex"], extraCodes:[] },
          { header:"Reinin Only",       sub:"Structural",        codes:["Mr","Co","Ac","Qd"] },
          { header:"Minaiev Only",      sub:"Domain",            codes:["Ki","Bu","Sd","Mg"] },
          { header:"Rings",             sub:"Composed, directed",codes:["Bn","Sv"] },
        ];
        // Core group only has 3 sym relations (Id excluded from RMETA), pad with empty
        const groupDefs = [
          { header:"Reinin or Minaiev", sub:"Either space",       codes:["__Id","Du","Su","Ex"]  },
          { header:"Reinin Only",       sub:"Structural",         codes:["Mr","Co","Ac","Qd"]   },
          { header:"Minaiev Only",      sub:"Domain",             codes:["Ki","Bu","Sd","Mg"]   },
          { header:"Reinin and Minaiev",sub:"Rings of Progress",  codes:["Bn","Sv","",""]       },
        ];
        return (
          <div style={{ marginTop:16, display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12 }}>
            {groupDefs.map((g,gi) => (
              <div key={gi} style={{ display:'flex', flexDirection:'column', gap:6 }}>
                <div style={{ marginBottom:2 }}>
                  <div style={{ fontSize:10, fontWeight:700, color:C.text, letterSpacing:1, textTransform:'uppercase', fontFamily:"'JetBrains Mono',monospace" }}>{g.header}</div>
                  <div style={{ fontSize:9, color:C.textDim, fontStyle:'italic' }}>{g.sub}</div>
                </div>
                {g.codes.map((code, ci) => {
                  if (!code) return <div key={ci} style={{ height:34 }}/>;
                  if (code === "__Id") return (
                    <div key="Id" style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 9px', background:'rgba(100,116,139,0.04)', border:'1px solid rgba(100,116,139,0.15)', borderRadius:8, opacity:0.45 }}>
                      <div style={{ width:20, minWidth:20, padding:'3px 4px', textAlign:'center', fontSize:10, fontWeight:800, color:'#64748b', background:'rgba(100,116,139,0.1)', border:'1px solid rgba(100,116,139,0.25)', borderRadius:4, fontFamily:"'JetBrains Mono',monospace" }}>Id</div>
                      <span style={{ fontSize:11, color:'#64748b', fontWeight:500, textDecoration:'line-through', textDecorationColor:'rgba(100,116,139,0.5)' }}>Identity</span>
                    </div>
                  );
                  const m = RMETA[code];
                  return (
                    <div key={code} style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 9px', background:`${m.color}0a`, border:`1px solid ${m.color}28`, borderRadius:8 }}>
                      <div style={{ width:20, minWidth:20, padding:'3px 4px', textAlign:'center', fontSize:10, fontWeight:800, color:m.color, background:`${m.color}1a`, border:`1px solid ${m.color}40`, borderRadius:4, fontFamily:"'JetBrains Mono',monospace" }}>{code}</div>
                      <span style={{ fontSize:11, color:C.text, fontWeight:500 }}>{m.name}</span>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        );
      })()}

      {/* ── Instructions ── */}
      <div style={{ marginTop:14, padding:'12px 16px', background:`${C.accent2}08`, border:`1px solid ${C.accent2}20`, borderRadius:10 }}>
        <p style={{ margin:0, fontSize:12, color:C.textDim, lineHeight:1.6 }}>
          <strong style={{ color:C.textMuted }}>Click any type</strong> to isolate its 13 relations.{' '}
          <strong style={{ color:C.textMuted }}>Benefit / Supervision</strong> buttons trace the directed rings; then select an individual ring to animate a single 4-cycle.{' '}
          <strong style={{ color:C.textMuted }}>Show filters</strong> toggle relation categories. All bezier arcs pass through center, the chord-diagram aesthetic reflects the algebraic structure of the Reinin × Minaiev synthesis.
        </p>
      </div>
    </div>
  );
}

  const QUADRA_BOUNDS = { Alpha:[0,4], Beta:[4,8], Gamma:[8,12], Delta:[12,16] };

  const REL_META = {

    Du:{name:"Dual",           color:"#10b981"},

  return (

        <div style={{ maxWidth: 920, margin: "0 auto" }}>

          <Card color={C.accent1}>
            <SectionTitle color={C.accent1}>Relations as Structural Information Acoustics</SectionTitle>
            <Prose>
              Intertype Relations (ITRs) are not mystical romantic compatibility, nor are they horoscope-tier pairings. They are the measurement of friction and resonance that emerges when one person's metabolic output (the information elements produced by their Ego block) enters another person's receptor array (the Super-Id and Super-Ego blocks). Each pairing of sociotypes generates a specific, mathematically predictable acoustic profile: some signals land on starving receptors and nourish them, others collide with defended functions and produce dissonance, and still others bypass the recipient entirely.
            </Prose>
            <Prose>
              Think of each sociotype as a transmitter broadcasting on fixed frequencies and a receiver tuned to fixed frequencies. When person A's broadcast frequencies align with person B's reception frequencies, the channel is clear, information flows cheaply, and both parties experience cognitive ease. When they misalign, the metabolic system expends enormous effort to translate incompatible signals, and the resulting friction is experienced as fatigue, confusion, or hostility. Relations are thus a cybernetic property of the pair, not a personality trait of either individual.
            </Prose>
          </Card>

          <Divider label="The 14 Relations at a Glance" color={C.text} />
          <Card>
            <Prose>
              Before descending into specifics, note that the full Socion decomposes into exactly 14 distinct intertype relations. The algebra, proven by Vladimir Vincent on the foundation of Reinin's and Minaiev's dichotomy spaces, partitions these 14 relations into four mathematically distinct categories based on which dichotomy space can define them.
            </Prose>
            <Prose>
              The number 14 itself is peculiar and worth pausing on. Naively, one might expect 16 relations (one for each of the 16 possible pairings a given sociotype can have, including itself), or perhaps 15 (excluding Identity as trivial). Neither intuition is correct. The answer drops to 14 because the two asymmetric ring relations, Benefit and Supervision, each collapse two apparent pairings into a single directional relation: Benefactor-to-Beneficiary and Supervisor-to-Supervisee describe the same structural dynamic viewed from opposite ends, so each ring contributes only one distinct relation to the count rather than two. Algebraically, this is the statement that the composition of any Reinin dichotomy with any Minaiev dichotomy yields exactly one of four asymmetric operations, not eight; the "direction" of the ring is a reading frame, not a second relation. The result is 4 + 4 + 4 + 2 = 14, and this count is forced by the group structure of the 24-dichotomy synthesis. Any alternative counting scheme either double-counts the rings or introduces relations that fail to preserve the Socion's symmetry under one or both dichotomy spaces, which is why classical and modern Socionics converge on the same 14 despite very different notational conventions.
            </Prose>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginTop: 14 }}>

          <Divider label="Why Relations Matter" color={C.teal} />
          <Card color={C.teal}>
            <SectionTitle color={C.teal}>Metabolic Starvation and Toxicity</SectionTitle>
            <Prose>
              Every sociotype has weak or absent cognitive functions whose contents the psyche still needs in order to navigate reality. The Super-Id block (Suggestive and Mobilizing functions) represents areas of perpetual hunger: information the type cannot generate internally but desperately needs from the environment. When those receptors are fed by a partner's Ego output, the effect is qualitatively different from merely receiving "helpful" information; it is cognitive nourishment at the architectural level, lowering stress, increasing confidence, and freeing the Ego to do its natural work.
            </Prose>
            <Prose>
              Conversely, when a partner's output hits the Super-Ego block (Role and Vulnerable functions), the result is not merely unpleasant but metabolically toxic. These are functions that the psyche has learned to conceal or compensate for, and having them targeted, even innocently, produces a stress response far out of proportion to the surface content. This is why some relationships deplete both parties despite good intentions, and why others generate sustained energy without any visible effort: the difference is structural, not behavioral.
            </Prose>
          </Card>

          <Divider label="Clarity vs. Obscurity" color={C.accent2} />
          <Card color={C.accent2}>
            <SectionTitle color={C.accent2}>Which Relations Are Empirically Well-Defined</SectionTitle>
            <Prose>
              Not all relations are equally observable. Duality, Conflict, and Supervision have sharp, consistent behavioral signatures that both the classical literature and modern empirical work recover reliably: duality produces long-term marital stability, conflict produces mutual avoidance, and supervision produces a persistent asymmetric tension that the supervisee experiences as being watched even when the supervisor is acting neutrally. These are the "load-bearing" relations of the theory.
            </Prose>
            <Prose>
              By contrast, relations like Semi-Dual, Mirage, Activity, and Business often blur into each other in real-world observation. They share cognitive domains or creative outputs but diverge on deeper parameters that require careful instruments to isolate. Talanov's SOLTI-192 questionnaires and the statistical work at sociotype.xyz/r are specifically designed to decouple these blurry relations by measuring functional profiles directly rather than inferring them from surface behavior.
            </Prose>
            <Prose style={{ marginBottom: 0 }}>
              Decoupling these blurry relations will require substantially more empirical work than has been conducted to date. The SOLTI-192 dataset and the sociotype.xyz correlation tables are a strong start, but a truly rigorous validation would demand longitudinal studies of cohabiting dyads, controlled laboratory paradigms measuring physiological stress responses to each relation type, and cross-cultural replications outside the predominantly Russian-speaking Socionics research base. The payoff would be substantial: if the finer-grained relations could be isolated with the same confidence as Duality and Conflict, algorithmic matching systems could move beyond coarse quadra-level recommendations to predict exactly which flavor of metabolic complement a given person should seek, and organizational psychology could design teams that exploit the full 14-relation spectrum rather than treating all non-conflict pairings as interchangeable.
            </Prose>
          </Card>

          <Divider label="Practical Applications" color={C.amber} />
          <Card color={C.amber}>
            <SectionTitle color={C.amber}>Beyond Personality Typing</SectionTitle>
            <Prose>
              ITRs transcend standard personality matching because they predict structural compatibility rather than surface similarity. Two people may share all the same hobbies, political views, and aesthetic tastes and still metabolize each other's presence as exhausting, because their Ego outputs continuously target each other's Super-Ego blocks. Inversely, two people with radically different tastes may find each other's presence effortless because their cognitive architectures are complementary.
            </Prose>

          <Divider label="Similarity vs. Complementarity" color={C.rose} />
          <Card color={C.rose}>
            <SectionTitle color={C.rose}>Do Opposites Attract? Depends... Which Opposites?</SectionTitle>
            <Prose>
              The popular debate between "opposites attract" and "birds of a feather flock together" is a false dichotomy. The empirical personality literature has resolved it by asking a more precise question: opposites or similars on what dimension? The answer consistently splits along a clean line: similarity wins on everything that functions as a shared operating system, while complementarity wins on everything that functions as division of labor.
            </Prose>
            <Prose>
              Evolutionary biology offers the simplest explanation for the split. Our ancestors faced two different mate-selection problems simultaneously. The first was coordination: a pair raising offspring together across years had to agree on what dangers to avoid, which resources to pursue, and what counted as acceptable behavior, and mismatches on those questions were lethal. Selection pressured our mate-evaluation systems to look for shared values, shared moral orientation, and shared attachment patterns. The second problem was complementarity: a pair that pooled identical skills wasted the potential gains from specialization, while a pair whose strengths covered different domains could exploit a larger ecological niche together than either could alone. Selection pressured the same systems to look for partners whose cognitive, temperamental, and physiological endowments filled in the gaps in our own. The two pressures live inside every modern human, which is why we simultaneously want someone who "gets it" and someone who "brings something different."
            </Prose>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 14, marginTop: 18 }}>
              <div style={{ background: `${C.dual}0a`, border: `1px solid ${C.dual}28`, borderRadius: 10, padding: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.dual, marginBottom: 10, letterSpacing: 0.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono', monospace" }}>Similarity Wins</div>
                <SmallProse style={{ color: C.textMuted, marginBottom: 6 }}><strong>Core values and moral orientation:</strong> Openness, Honesty-Humility (HEXACO), religious and political attitudes. Highest spousal similarity coefficients in the entire literature.</SmallProse>
                <SmallProse style={{ color: C.textMuted, marginBottom: 6 }}><strong>Attachment style and love style:</strong> Secure-secure pairings dominate satisfaction metrics across hundreds of studies.</SmallProse>
                <SmallProse style={{ color: C.textMuted, marginBottom: 6 }}><strong>Conscientiousness in life goals:</strong> Partners who agree on how much structure, planning, and effort a life should contain avoid a primary source of chronic friction.</SmallProse>
                <SmallProse style={{ color: C.textMuted, marginBottom: 0 }}><strong>Agreeableness and warmth baseline:</strong> Equal levels of willingness to accommodate the other predict stability; large asymmetries predict resentment.</SmallProse>
              </div>
              <div style={{ background: `${C.asymmetric}0a`, border: `1px solid ${C.asymmetric}28`, borderRadius: 10, padding: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.asymmetric, marginBottom: 10, letterSpacing: 0.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono', monospace" }}>Complementarity Wins</div>
                <SmallProse style={{ color: C.textMuted, marginBottom: 6 }}><strong>Cognitive style:</strong> Intuitive-Sensing and Thinking-Feeling complementarity allows one partner to see what the other misses; this is the literal mechanism of Socionics Duality.</SmallProse>
                <SmallProse style={{ color: C.textMuted, marginBottom: 6 }}><strong>Extraversion and energy rhythm:</strong> Equal-extraversion couples exhaust the same resource; complementary energy patterns let each partner recharge while the other engages.</SmallProse>
                <SmallProse style={{ color: C.textMuted, marginBottom: 6 }}><strong>Dominance and conflict-resolution roles:</strong> Carson's classic finding, equal warmth but opposite dominance, predicts smoother negotiation of practical decisions.</SmallProse>
                <SmallProse style={{ color: C.textMuted, marginBottom: 0 }}><strong>Temperament and patience curves:</strong> Fast-and-impulsive paired with slow-and-deliberate outperforms two of either in long-term task completion.</SmallProse>
              </div>
            </div>
            <Prose style={{ marginTop: 18, marginBottom: 0 }}>
              This split is exactly what Socionics Duality encodes at the structural level. Dual partners share quadra values (similarity on the operating system) while inverting every cognitive function position (complementarity on the cognitive hardware). It is the only relation in the Socion that satisfies both evolutionary pressures at once, which is why it dominates Bukalov's marriage data and why Fisher's Director-Negotiator pairing, the most direct mainstream analog, shows a similar statistical preference. Identity and Kindred fail the complementarity test, Conflict and Super-Ego fail the similarity test, and only the intra-quadra complementary relations (especially Duality) thread the needle.
            </Prose>

            </Prose>
            <Prose>
              Practically, this means that when two relations agree on a pairing being Identity or Dual or Super-Ego or Extinguishment, that agreement is not an accident of notation; it reflects a real invariant of the information metabolism. These are also the relations with the cleanest behavioral signatures in the empirical literature, which is no coincidence. What is mathematically robust tends also to be phenomenologically robust.

            </Prose>
            <Prose>

        {/* ═══════════════════ ASYMMETRIC ENGINE ═══════════════════ */}
        {activeSection === "asymmetric" && <>
          <Divider label="Mathematical Origin" color={C.asymmetric} />
          <Card color={C.asymmetric}>

                        {a} <span style={{ color: meta.color }}>{rel.includes(">") || rel.includes("<") ? (rel.includes(">") ? ">" : "<") : "<>"}</span> {b}
                      </div>
                      <div style={{ fontSize: 11, color: meta.color, marginTop: 2, fontWeight: 600 }}>{meta.name}</div>
                    </div>
                  </div>
                );
              })() : selectedType ? (
                <div style={{ fontSize: 12, color: C.textMuted }}>
                  Row <span style={{ color: C.text, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" }}>{selectedType}</span> selected. Click again to deselect, or hover any cell to see its relation.
                </div>
              ) : (
                <div style={{ fontSize: 12, color: C.textDim, fontStyle: "italic" }}>
                  Hover any cell to see the full relation name, or click a row label to highlight that type's full profile.
                </div>
              )}
            </div>
          </Card>

          {/* Legend */}
          <Card>
            <SectionTitle>Legend</SectionTitle>
            <SmallProse style={{ marginBottom: 14 }}>
              The sixteen relations group by which dichotomy space defines them, following Vincent's Reinin and Minaiev synthesis. Four exist in either space, four are exclusive to the Reinin space, four are exclusive to the Minaiev space, and the four asymmetric ring relations exist only as a composition of both.
            </SmallProse>
            <div className="legend-grid">
              {[
                { header: "Reinin or Minaiev", sub: "Either space", codes: ["Id", "Du", "Su", "Ex"] },
                { header: "Reinin Only", sub: "Structural", codes: ["Mr", "Co", "Ac", "Qd"] },
                { header: "Minaiev Only", sub: "Domain", codes: ["Ki", "Bu", "Sd", "Mg"] },
                { header: "Reinin and Minaiev", sub: "Composed, asymmetric", codes: ["Bn>", "Bn<", "Sv>", "Sv<"] },
              ].map((group, gi) => (
                <div key={gi} style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  <div style={{ marginBottom: 2 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: C.text, letterSpacing: 1, textTransform: "uppercase", fontFamily: "'JetBrains Mono', monospace" }}>{group.header}</div>
                    <div style={{ fontSize: 9, color: C.textDim, fontStyle: "italic" }}>{group.sub}</div>
                  </div>
                  {group.codes.map((code) => {
                    const meta = REL_META[code];
                    return (
                      <div key={code} style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 9px", background: `${meta.color}0a`, border: `1px solid ${meta.color}28`, borderRadius: 8 }}>
                        <div style={{ minWidth: 30, padding: "3px 5px", textAlign: "center", fontSize: 10, fontWeight: 800, color: meta.color, background: `${meta.color}1a`, border: `1px solid ${meta.color}40`, borderRadius: 4, fontFamily: "'JetBrains Mono', monospace" }}>{code}</div>
                        <div style={{ fontSize: 11, color: C.text, fontWeight: 500 }}>{meta.name}</div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
            <SmallProse style={{ marginTop: 14 }}>
              The four asymmetric relations use directional brackets: <Mono color={C.text}>{'Bn>'}</Mono> means the row type is the Benefactor <em>to</em> the column type, while <Mono color={C.text}>{'Bn<'}</Mono> means the row type receives benefit <em>from</em> the column type. Supervision follows the same convention. All other relations are symmetric and read identically regardless of direction.
            </SmallProse>
          </Card>

          {/* Quadra structure readout */}
          <Card>
            <SectionTitle>Reading the Quadra Structure</SectionTitle>
            <Prose>
              Each quadra block along the main diagonal is a 4×4 sub-matrix containing only the four intra-quadra relations: Identity, Duality, Activity, and Mirror. These are the relations Bukalov's marriage data shows dominating 64 percent of couples, and their tight geometric localization here makes clear why: intra-quadra pairings require no translation across quadra-value boundaries.
            </Prose>
            <Prose>
              Moving outward from the diagonal, the off-block regions contain the inter-quadra relations. The anti-quadra (directly opposite) block carries the toxic relations (Super-Ego, Conflict, Extinguishment, Quasi-Identity), while the two adjacent quadra blocks carry the ring relations (Benefit and Supervision) along with the softer cross-quadra pairings (Kindred, Mirage, Business, Semi-Dual).
            </Prose>
            <Prose style={{ marginBottom: 0 }}>
              This spatial structure is not decorative; it is the algebraic signature of the Reinin and Minaiev dichotomy products acting on the Socion. The matrix is, in effect, a visual proof that the 14 relations are not an arbitrary list but an exhaustive consequence of how the dichotomies partition the 16-type space.
            </Prose>
          </Card>
        </>}

        {/* ═══════════════════ SOCIOGRAM ═══════════════════ */}
        {activeSection === "sociogram" && <>
          <Divider label="Interactive Sociogram" color="#a78bfa" />
          <Card color="#a78bfa">
            <SectionTitle color="#a78bfa">The Full Socion as a Network</SectionTitle>
            <Prose>
              The 16 socionics types arranged in a circle, with all 104 directed and undirected edges drawn as quadratic bezier curves arcing through the center. Every arc passes through (CX, CY): the chord-diagram aesthetic that makes the algebraic structure of the Reinin × Minaiev synthesis directly visible as geometry. Types in the same quadra occupy adjacent nodes; the four colored sector bands mark the Alpha, Beta, Gamma, and Delta quadra groupings.
            </Prose>
            <Prose style={{ marginBottom:0 }}>
              The benefit and supervision rings are the two directed sub-structures: four 4-cycles each, where the direction of the arrow encodes the flow of the relation. Animated dashes on active ring edges show which types are upstream and downstream in each cycle. All symmetric relations are rendered as undirected chords; selecting a single type reduces the graph to that type's 13-relation neighborhood.
            </Prose>
          </Card>
          <SociogramView />
        </>}

        {/* FOOTER */}
        <div style={{ textAlign: "center", marginTop: 48, paddingTop: 24, borderTop: `1px solid ${C.border}` }}>
          <p style={{ fontSize: 10, color: C.textDim, letterSpacing: 1.5, fontFamily: "'JetBrains Mono', monospace" }}>
            SOURCES: Vincent V (Mandalas, Dichotomy Spaces, Models) · Bukalov AV (Marriage Statistics) · Talanov VL (SOLTI-192) · Romanov I (socionavigator.com) · Augusta A (Model A) · Reinin GR · Minaiev Y · sociotype.xyz/r · quantitativesocionics.org · Danidin · wikisocion.github.io · opensocionics.gitbook.io
          </p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<IntertypeReport />, document.getElementById('root'));
</script>
</body>
</html>
